name: NATS Server Tests

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  RACE: ${{ (github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') && github.event_name != 'pull_request') && '-race' || '' }}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/heads/release/') }}

jobs:
  signoffs:
    name: Sign-offs
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check all PR commits are signed off
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          range="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"

          missing=0
          missing_list=""

          for c in $(git rev-list --no-merges $range); do
            msg="$(git log -1 --pretty=%B "$c")"
            if ! printf '%s\n' "$msg" | grep -q '^Signed-off-by:'; then
              echo "::error ::Commit $c has not been signed off"
              git log -1 --pretty=format:"%h %s" "$c"
              missing=1
              missing_list+=$'\n- '"$(git log -1 --pretty=format:'%H `%s`' "$c")"''
            fi
          done

          if [ "$missing" -ne 0 ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "$(printf "Please review the \`CONTRIBUTING.md\` guide as some commits are missing \`Signed-off-by:\` in their commit messages.\n\nTo correct, please amend the following commits and force-push:\n\n%s" "$missing_list")"
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Run golangci-lint
        # Use commit hash here to avoid a re-tagging attack, as this is a third-party action
        # Commit 1481404843c368bc19ca9406f87d6e0fc97bdcfd = tag v7.0.0
        uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd
        with:
          version: v2.9.0
          skip-cache: true
          skip-save-cache: true
          args: --timeout=5m --config=.golangci.yml

  build-latest:
    name: Build (Latest Go)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Build NATS Server 64-bit
        run: GOARCH=amd64 GOOS=linux go build

      - name: Build NATS Server 32-bit
        run: GOARCH=386 GOOS=linux go build

  build-supported:
    name: Build (Minimum Go)
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build NATS Server 64-bit
        run: GOARCH=amd64 GOOS=linux go build

      - name: Build NATS Server 32-bit
        run: GOARCH=386 GOOS=linux go build

  # Using GitHub-supplied workers for Windows for now.
  # Note that the below testing steps depend on the Linux build
  # only, as the Windows builds take a fair bit longer to set up.
  build-windows:
    name: Build (Minimum Go, ${{ matrix.os }})
    needs: [lint]
    strategy:
      fail-fast: false
      matrix:
        os: [windows-2022, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "go.mod"

      - name: Build NATS Server
        run: go build

  store:
    name: Test Stores
    needs: [build-latest, build-supported, lint]
    runs-on: ${{ vars.GHA_WORKER_MEDIUM || 'ubuntu-latest' }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run unit tests
        run: ./scripts/runTestsOnTravis.sh store_tests

  js-no-cluster:
    name: Test JetStream
    needs: [build-latest, build-supported, lint]
    runs-on: ${{ vars.GHA_WORKER_LARGE || 'ubuntu-latest' }}
